<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <title>Royal Crown Signal</title>
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d060"/>
      <stop offset="0.5" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#a8832a"/>
    </linearGradient>
    <linearGradient id="cbeam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8e1" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#f0d060" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff8e1" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#f0d060" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cjewel" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#fff8e1"/>
      <stop offset="0.6" stop-color="#f0d060"/>
      <stop offset="1" stop-color="#a8832a"/>
    </radialGradient>
    <filter id="cglowf" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="csoft" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <style>
    #beams { transform-box: fill-box; transform-origin: center; animation: spin 12s linear infinite; }
    #aura  { transform-box: fill-box; transform-origin: center; animation: auraPulse 5s ease-in-out infinite; }
    #crown { transform-box: fill-box; transform-origin: center bottom; animation: rise 5s ease-in-out infinite; }
    .jewel { transform-box: fill-box; transform-origin: center; animation: glint 5s ease-in-out infinite; }
    .j2 { animation-delay: 1.1s; }
    .j3 { animation-delay: 2.2s; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes auraPulse {
      0%,100% { transform: scale(0.85); opacity: 0.45; }
      50%     { transform: scale(1.08); opacity: 0.9; }
    }
    @keyframes rise {
      0%,100% { transform: translateY(6px) scale(0.98); }
      45%     { transform: translateY(-6px) scale(1.02); }
    }
    @keyframes glint {
      0%,100% { opacity: 0.7; transform: scale(0.9); }
      50%     { opacity: 1;   transform: scale(1.25); }
    }
  </style>

  <circle id="aura" cx="120" cy="126" r="70" fill="url(#cglow)" filter="url(#csoft)"/>

  <g id="beams" opacity="0.7">
    <g fill="url(#cbeam)">
      <path d="M120 120 L114 20 L126 20 Z"/>
      <path d="M120 120 L200 40 L208 52 Z"/>
      <path d="M120 120 L40 40 L32 52 Z"/>
      <path d="M120 120 L216 116 L216 128 Z"/>
      <path d="M120 120 L24 116 L24 128 Z"/>
      <path d="M120 120 L190 190 L200 178 Z"/>
      <path d="M120 120 L50 190 L40 178 Z"/>
    </g>
  </g>

  <g id="crown" filter="url(#cglowf)">
    <path fill="url(#cg)" stroke="#a8832a" stroke-width="1.5" stroke-linejoin="round"
      d="M78 150 L70 96 L96 122 L120 82 L144 122 L170 96 L162 150 Z"/>
    <rect x="76" y="150" width="88" height="16" rx="4" fill="url(#cg)" stroke="#a8832a" stroke-width="1.5"/>
    <circle class="jewel" cx="120" cy="158" r="5" fill="url(#cjewel)"/>
    <circle class="jewel j2" cx="98" cy="158" r="3.6" fill="url(#cjewel)"/>
    <circle class="jewel j3" cx="142" cy="158" r="3.6" fill="url(#cjewel)"/>
    <circle cx="70" cy="94" r="5" fill="url(#cjewel)"/>
    <circle cx="120" cy="80" r="5.5" fill="url(#cjewel)"/>
    <circle cx="170" cy="94" r="5" fill="url(#cjewel)"/>
  </g>
</svg>
