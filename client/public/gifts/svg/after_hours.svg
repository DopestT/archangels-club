<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="ahHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e1" stop-opacity="0.5"/>
      <stop offset="45%" stop-color="#f0d060" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ahMoon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="45%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#a8832a"/>
    </linearGradient>
    <linearGradient id="ahSweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff8e1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff8e1" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fff8e1" stop-opacity="0"/>
    </linearGradient>
    <filter id="ahSoft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="ahBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
    <clipPath id="ahMoonClip">
      <path d="M148 44 A78 78 0 1 0 148 196 A62 62 0 1 1 148 44 Z"/>
    </clipPath>
  </defs>
  <style>
    .ah-halo { transform-origin:120px 120px; animation:ahHaloP 7s ease-in-out infinite; }
    .ah-moon { transform-origin:120px 120px; animation:ahFloat 7s ease-in-out infinite; }
    .ah-sweep { animation:ahSweepM 7s ease-in-out infinite; }
    .ah-star { animation:ahTwinkle 4s ease-in-out infinite; transform-origin:center; }
    .ah-drift { animation:ahDrift 9s ease-in-out infinite; }
    @keyframes ahHaloP { 0%,100% { opacity:0.55; transform:scale(1); } 50% { opacity:0.9; transform:scale(1.1); } }
    @keyframes ahFloat { 0%,100% { transform:translateY(0) rotate(-2deg); } 50% { transform:translateY(-6px) rotate(2deg); } }
    @keyframes ahSweepM { 0% { transform:translateX(-120px); opacity:0; } 20% { opacity:0.9; } 45% { transform:translateX(120px); opacity:0; } 100% { transform:translateX(120px); opacity:0; } }
    @keyframes ahTwinkle { 0%,100% { opacity:0.25; transform:scale(0.7); } 50% { opacity:1; transform:scale(1.15); } }
    @keyframes ahDrift { 0%,100% { transform:translate(0,0); } 50% { transform:translate(6px,-8px); } }
  </style>

  <circle class="ah-halo" cx="120" cy="120" r="100" fill="url(#ahHalo)" filter="url(#ahSoft)"/>

  <g class="ah-moon">
    <path d="M148 44 A78 78 0 1 0 148 196 A62 62 0 1 1 148 44 Z" fill="url(#ahMoon)"/>
    <path d="M148 44 A78 78 0 1 0 148 196 A62 62 0 1 1 148 44 Z" fill="none" stroke="#fff8e1" stroke-width="1.2" opacity="0.6" filter="url(#ahBlur)"/>
    <g clip-path="url(#ahMoonClip)">
      <rect class="ah-sweep" x="0" y="20" width="120" height="200" fill="url(#ahSweep)" transform="skewX(-12)"/>
    </g>
  </g>

  <g fill="#fff8e1" class="ah-drift">
    <path class="ah-star" d="M64 46 l2.4 6 6 2.4 -6 2.4 -2.4 6 -2.4 -6 -6 -2.4 6 -2.4 Z" style="animation-delay:0s"/>
    <path class="ah-star" d="M200 70 l1.8 4.6 4.6 1.8 -4.6 1.8 -1.8 4.6 -1.8 -4.6 -4.6 -1.8 4.6 -1.8 Z" style="animation-delay:1.1s"/>
    <circle class="ah-star" cx="46" cy="120" r="2.6" style="animation-delay:2s"/>
    <circle class="ah-star" cx="206" cy="150" r="3" style="animation-delay:0.7s"/>
    <circle class="ah-star" cx="90" cy="204" r="2.2" style="animation-delay:1.6s"/>
    <circle class="ah-star" cx="180" cy="196" r="2.4" style="animation-delay:2.6s"/>
    <circle class="ah-star" cx="150" cy="40" r="2" style="animation-delay:3.2s"/>
  </g>
  <g fill="#f0d060" class="ah-drift" style="animation-delay:2s">
    <circle class="ah-star" cx="30" cy="72" r="2" style="animation-delay:1.3s"/>
    <circle class="ah-star" cx="212" cy="110" r="2.2" style="animation-delay:0.4s"/>
    <circle class="ah-star" cx="120" cy="214" r="2" style="animation-delay:2.9s"/>
    <circle class="ah-star" cx="60" cy="176" r="1.8" style="animation-delay:3.6s"/>
  </g>
</svg>
