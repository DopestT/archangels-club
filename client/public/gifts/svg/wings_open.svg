<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <title>Angel Wings Open</title>
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d060"/>
      <stop offset="0.5" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#a8832a"/>
    </linearGradient>
    <radialGradient id="wcore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff8e1" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#f0d060" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <filter id="wglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wsoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <path id="feather" d="M0 0 C 22 -6 44 -4 66 -16 C 52 -2 60 6 74 4 C 56 10 62 20 74 22 C 54 24 58 34 68 40 C 48 38 46 48 50 60 C 34 44 16 30 0 24 Z" fill="url(#wg)"/>
  </defs>

  <style>
    #leftWing, #rightWing { transform-box: fill-box; transform-origin: right center; animation: spreadL 5s ease-in-out infinite; }
    #rightWing { transform-origin: left center; animation-name: spreadR; }
    #halo { transform-box: fill-box; transform-origin: center; animation: haloPulse 5s ease-in-out infinite; }
    .fth { opacity: 0.96; }

    @keyframes spreadL {
      0%   { transform: rotate(28deg) scale(0.72); opacity: 0.35; }
      30%  { transform: rotate(-6deg) scale(1.04); opacity: 1; }
      45%  { transform: rotate(0deg) scale(1); }
      70%  { transform: rotate(-3deg) scale(1.015); }
      100% { transform: rotate(28deg) scale(0.72); opacity: 0.35; }
    }
    @keyframes spreadR {
      0%   { transform: rotate(-28deg) scale(0.72); opacity: 0.35; }
      30%  { transform: rotate(6deg) scale(1.04); opacity: 1; }
      45%  { transform: rotate(0deg) scale(1); }
      70%  { transform: rotate(3deg) scale(1.015); }
      100% { transform: rotate(-28deg) scale(0.72); opacity: 0.35; }
    }
    @keyframes haloPulse {
      0%   { transform: scale(0.5); opacity: 0.2; }
      30%  { transform: scale(1); opacity: 0.9; }
      65%  { transform: scale(0.92); opacity: 0.7; }
      100% { transform: scale(0.5); opacity: 0.2; }
    }
  </style>

  <ellipse id="halo" cx="120" cy="120" rx="46" ry="46" fill="url(#wcore)" filter="url(#wsoft)"/>

  <g id="leftWing" filter="url(#wglow)">
    <g transform="translate(116 120) scale(-1 1)">
      <use class="fth" href="#feather" transform="translate(0 -20) rotate(-6) scale(0.72)"/>
      <use class="fth" href="#feather" transform="translate(2 0) scale(0.9)"/>
      <use class="fth" href="#feather" transform="translate(0 20) rotate(6) scale(0.78)"/>
    </g>
  </g>

  <g id="rightWing" filter="url(#wglow)">
    <g transform="translate(124 120)">
      <use class="fth" href="#feather" transform="translate(0 -20) rotate(-6) scale(0.72)"/>
      <use class="fth" href="#feather" transform="translate(2 0) scale(0.9)"/>
      <use class="fth" href="#feather" transform="translate(0 20) rotate(6) scale(0.78)"/>
    </g>
  </g>
</svg>
