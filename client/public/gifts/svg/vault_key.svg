<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <title>Vault Key Unlocking</title>
  <defs>
    <linearGradient id="kg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0d060"/>
      <stop offset="0.5" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#a8832a"/>
    </linearGradient>
    <radialGradient id="kglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff8e1" stop-opacity="0.75"/>
      <stop offset="0.55" stop-color="#f0d060" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ksheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff8e1" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#fff8e1" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fff8e1" stop-opacity="0"/>
    </linearGradient>
    <filter id="kglowf" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ksoft" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="kclip">
      <path d="M120 44 a26 26 0 1 0 0.01 0 M112 92 h16 v58 h-8 l8 10 v10 l-10 8 v14 h-6 v-100 Z"/>
    </clipPath>
  </defs>

  <style>
    #aura { transform-box: fill-box; transform-origin: center; animation: auraP 5.5s ease-in-out infinite; }
    #key  { transform-box: fill-box; transform-origin: 120px 120px; animation: unlock 5.5s ease-in-out infinite; }
    #sheen { animation: sweep 5.5s ease-in-out infinite; }

    @keyframes auraP {
      0%,100% { transform: scale(0.85); opacity: 0.4; }
      50%     { transform: scale(1.05); opacity: 0.85; }
    }
    @keyframes unlock {
      0%   { transform: rotate(0deg); }
      35%  { transform: rotate(0deg); }
      55%  { transform: rotate(-90deg); }
      80%  { transform: rotate(-90deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes sweep {
      0%,18%   { transform: translateX(-70px); opacity: 0; }
      30%      { opacity: 1; }
      42%,100% { transform: translateX(70px); opacity: 0; }
    }
  </style>

  <circle id="aura" cx="120" cy="120" r="66" fill="url(#kglow)" filter="url(#ksoft)"/>

  <g id="key" filter="url(#kglowf)">
    <circle cx="120" cy="70" r="26" fill="none" stroke="url(#kg)" stroke-width="9"/>
    <circle cx="120" cy="70" r="10" fill="none" stroke="url(#kg)" stroke-width="6"/>
    <circle cx="120" cy="44" r="4" fill="url(#kg)"/>
    <rect x="115" y="92" width="10" height="72" rx="3" fill="url(#kg)"/>
    <path d="M125 150 h12 v8 h-12 Z" fill="url(#kg)"/>
    <path d="M125 132 h9 v7 h-9 Z" fill="url(#kg)"/>
    <path d="M115 158 l-8 8 v10 l8 -6 Z" fill="url(#kg)"/>

    <g clip-path="url(#kclip)">
      <rect id="sheen" x="90" y="30" width="26" height="160" fill="url(#ksheen)" transform="rotate(12 120 120)"/>
    </g>
  </g>
</svg>
