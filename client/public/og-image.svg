<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#0F0F14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8962E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Radial glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid lines -->
  <g stroke="#D4AF37" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Gold top border -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#gold)" opacity="0.6"/>

  <!-- Gold divider line (decorative) -->
  <rect x="540" y="248" width="120" height="1" fill="url(#gold)" opacity="0.5"/>

  <!-- Wordmark: ARCHANGELS -->
  <text
    x="600" y="220"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="400"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="18"
  >ARCHANGELS</text>

  <!-- Gold rule -->
  <text x="600" y="295" font-family="Georgia, serif" font-size="28" fill="#D4AF37" text-anchor="middle" letter-spacing="8" opacity="0.9">✦ CLUB ✦</text>

  <!-- Tagline -->
  <text
    x="600" y="380"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="22"
    font-weight="300"
    fill="rgba(255,255,255,0.55)"
    text-anchor="middle"
    letter-spacing="3"
  >Private creator access. Exclusive drops. Direct custom requests.</text>

  <!-- Three feature pills -->
  <g>
    <!-- Pill 1 -->
    <rect x="246" y="430" width="200" height="44" rx="22" fill="#D4AF37" fill-opacity="0.08" stroke="#D4AF37" stroke-opacity="0.25" stroke-width="1"/>
    <text x="346" y="458" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="1">LOCKED DROPS</text>

    <!-- Pill 2 -->
    <rect x="500" y="430" width="200" height="44" rx="22" fill="#D4AF37" fill-opacity="0.08" stroke="#D4AF37" stroke-opacity="0.25" stroke-width="1"/>
    <text x="600" y="458" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="1">SUBSCRIPTIONS</text>

    <!-- Pill 3 -->
    <rect x="754" y="430" width="200" height="44" rx="22" fill="#D4AF37" fill-opacity="0.08" stroke="#D4AF37" stroke-opacity="0.25" stroke-width="1"/>
    <text x="854" y="458" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="1">CUSTOM REQUESTS</text>
  </g>

  <!-- Bottom: archangels.club -->
  <text
    x="600" y="575"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="16"
    fill="rgba(255,255,255,0.25)"
    text-anchor="middle"
    letter-spacing="2"
  >archangels.club</text>
</svg>
